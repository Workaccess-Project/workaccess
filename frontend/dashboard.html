<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Workaccess – Dashboard</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div id="wa-nav"></div>

      <!-- Billing / Trial banner -->
      <div class="section" id="billingBanner" style="display:none; border:1px solid var(--border); border-radius:12px; padding:12px;">
        <div style="display:flex; gap:10px; flex-wrap:wrap; align-items:center; justify-content:space-between;">
          <div>
            <div style="font-weight:700;" id="billingBannerTitle">—</div>
            <div class="small" id="billingBannerText" style="opacity:0.9;"></div>
          </div>
          <div style="display:flex; gap:10px; align-items:center; flex-wrap:wrap;">
            <button class="waBtn--primary" id="btnGoBilling" style="display:none;">Přejít na billing</button>
            <button id="btnBillingRefresh">Obnovit</button>
          </div>
        </div>
      </div>

      <div class="section">
        <h1 style="font-size:18px; margin:0;">Dashboard</h1>
        <div class="small" style="opacity:.9;">Rychlý přehled a nejdůležitější akce</div>
      </div>

      <div class="section" style="display:flex; gap:10px; flex-wrap:wrap; align-items:center;">
        <button class="waBtn--primary" id="btnEmployees">Zaměstnanci</button>
        <button id="btnCompliance">Compliance</button>
        <button id="btnBilling">Billing</button>
        <span class="small" id="metaLine" style="opacity:.8;"></span>
      </div>

      <div class="section" style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:10px;">
        <div class="card" style="padding:12px;">
          <div style="display:flex; justify-content:space-between; align-items:center;">
            <strong>Compliance</strong>
            <span class="pill" id="cntCompliance">0</span>
          </div>
          <div id="boxCompliance" class="small" style="margin-top:10px;">Načítám…</div>
        </div>

        <div class="card" style="padding:12px;">
          <div style="display:flex; justify-content:space-between; align-items:center;">
            <strong>Stav tarifu</strong>
            <span class="pill" id="pillPlan">—</span>
          </div>
          <div id="boxPlan" class="small" style="margin-top:10px;">Načítám…</div>
        </div>

        <div class="card" style="padding:12px;">
          <div style="display:flex; justify-content:space-between; align-items:center;">
            <strong>Rychlé tipy</strong>
            <span class="pill">pilot</span>
          </div>
          <div class="small" style="margin-top:10px; opacity:.9;">
            <div>• Začni přidáním zaměstnanců</div>
            <div>• Zkontroluj compliance přehled</div>
            <div>• Pokud narazíš na limit, otevři billing</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="./js/wa_config.js"></script>
  <script src="./js/wa_nav.js"></script>
  <script src="./api.js"></script>

  <script>
    WA_NAV.renderNav("dashboard");

    const elMetaLine = document.getElementById("metaLine");

    // compliance
    const elCntCompliance = document.getElementById("cntCompliance");
    const elBoxCompliance = document.getElementById("boxCompliance");

    // plan
    const elPillPlan = document.getElementById("pillPlan");
    const elBoxPlan = document.getElementById("boxPlan");

    // actions
    const elBtnEmployees = document.getElementById("btnEmployees");
    const elBtnCompliance = document.getElementById("btnCompliance");
    const elBtnBilling = document.getElementById("btnBilling");

    // billing banner
    const elBillingBanner = document.getElementById("billingBanner");
    const elBillingBannerTitle = document.getElementById("billingBannerTitle");
    const elBillingBannerText = document.getElementById("billingBannerText");
    const elBtnGoBilling = document.getElementById("btnGoBilling");
    const elBtnBillingRefresh = document.getElementById("btnBillingRefresh");

    function esc(s) {
      return String(s ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function fmtDate(iso) {
      const s = String(iso || "").trim();
      if (!s) return "";
      const d = new Date(s);
      if (String(d) === "Invalid Date") return s;
      return d.toISOString().slice(0, 10);
    }

    function daysLeft(untilIso) {
      const s = String(untilIso || "").trim();
      if (!s) return null;
      const d = new Date(s);
      if (String(d) === "Invalid Date") return null;
      const diffMs = d.getTime() - Date.now();
      return Math.ceil(diffMs / (24 * 60 * 60 * 1000));
    }

    function showBanner({ title, text, kind = "info", showGoBilling = false } = {}) {
      elBillingBanner.style.display = "";
      elBillingBannerTitle.textContent = title || "—";
      elBillingBannerText.textContent = text || "";

      const border =
        kind === "error" ? "#b42318" :
        kind === "warn" ? "#b54708" :
        kind === "ok" ? "#067647" :
        "var(--border)";

      const bg =
        kind === "error" ? "rgba(180,35,24,0.06)" :
        kind === "warn" ? "rgba(181,71,8,0.06)" :
        kind === "ok" ? "rgba(6,118,71,0.06)" :
        "rgba(0,0,0,0.02)";

      elBillingBanner.style.borderColor = border;
      elBillingBanner.style.background = bg;

      elBtnGoBilling.style.display = showGoBilling ? "" : "none";
    }

    function renderComplianceOverview(c) {
      const totalDocs = Number(c?.totalDocuments || 0);
      const totalTemplates = Number(c?.totalTemplates || 0);
      const active = Number(c?.active || 0);
      const expired = Number(c?.expired || 0);
      const soon = Number(c?.expiringSoon || 0);
      const missing = Number(c?.missing || 0);

      elCntCompliance.textContent = String(totalDocs);

      const red = expired > 0 ? "color:#b42318;" : "";
      const orange = soon > 0 ? "color:#b54708;" : "";

      elBoxCompliance.innerHTML = `
        <div>Šablony: <strong>${totalTemplates}</strong></div>
        <div>Dokumenty: <strong>${totalDocs}</strong></div>
        <div>Aktivní: <strong>${active}</strong></div>
        <div style="${red}">Propadlé: <strong>${expired}</strong></div>
        <div style="${orange}">Končí brzy: <strong>${soon}</strong></div>
        <div>Chybí vytvořit: <strong>${missing}</strong></div>
        <div class="small" style="opacity:.75; margin-top:6px;">Otevři detail v Compliance →</div>
      `;
    }

    async function refreshBillingStatus() {
      try {
        const s = await WA_API.getBillingStatus();

        const trialEnd = s?.trial?.end || "";
        const trialExpired = !!s?.trial?.expired;

        const subActive = !!s?.subscription?.active;
        const subEnd = s?.subscription?.end || "";
        const plan = s?.subscription?.plan || "";

        if (subActive) {
          elPillPlan.textContent = plan || "aktivní";
          elBoxPlan.textContent = `Tarif je aktivní do ${fmtDate(subEnd)}.`;
          showBanner({
            kind: "ok",
            title: "Tarif aktivní",
            text: `Tarif: ${plan || "—"} • aktivní do ${fmtDate(subEnd)}`,
            showGoBilling: false,
          });
          return;
        }

        elPillPlan.textContent = plan || "trial";

        if (trialExpired) {
          elBoxPlan.textContent = `Trial vypršel ${fmtDate(trialEnd)}. Pro pokračování je potřeba aktivovat tarif.`;
          showBanner({
            kind: "error",
            title: "Trial vypršel",
            text: `Trial vypršel ${fmtDate(trialEnd)}. Otevři billing a aktivuj tarif.`,
            showGoBilling: true,
          });
          return;
        }

        const left = daysLeft(trialEnd);
        if (left != null) {
          elBoxPlan.textContent = `Trial končí ${fmtDate(trialEnd)} (zbývá přibližně ${left} dní).`;
          showBanner({
            kind: left <= 3 ? "warn" : "info",
            title: "Trial běží",
            text: `Trial končí ${fmtDate(trialEnd)} (zbývá ~${left} dní).`,
            showGoBilling: false,
          });
          return;
        }

        elBoxPlan.textContent = "Stav tarifu není dostupný.";
        elBillingBanner.style.display = "none";
      } catch (e) {
        elPillPlan.textContent = "—";
        elBoxPlan.textContent = "Nelze načíst billing status.";
        showBanner({
          kind: "warn",
          title: "Nelze načíst billing status",
          text: `Chyba: ${esc(e?.message || e)}`,
          showGoBilling: false,
        });
      }
    }

    async function refreshMeAndUi() {
      // billing
      await refreshBillingStatus();

      // compliance
      try {
        const c = await WA_API.getComplianceOverview();
        renderComplianceOverview(c);
      } catch (e) {
        elCntCompliance.textContent = "0";
        elBoxCompliance.innerHTML = `<span class="pill">Chyba</span> ${esc(e?.message || e)}`;
      }

      // me
      try {
        const me = await WA_API.getMe();
        const role = me?.role || WA_NAV.getRole() || "—";
        const cid = me?.companyId || WA_NAV.getCompanyId?.() || "";
        const today = new Date().toISOString().slice(0, 10);
        elMetaLine.textContent = `Dnes: ${today} • role: ${role}${cid ? " • tenant: " + cid : ""}`;
      } catch (e) {
        elMetaLine.textContent = "Nelze načíst profil. Zkus obnovit stránku nebo se znovu přihlásit.";
      }
    }

    elBtnEmployees.addEventListener("click", () => {
      window.location.href = "./employees.html";
    });

    elBtnCompliance.addEventListener("click", () => {
      window.location.href = "./compliance.html";
    });

    elBtnBilling.addEventListener("click", () => {
      window.location.href = "./billing.html";
    });

    elBtnGoBilling.addEventListener("click", () => {
      window.location.href = "./billing.html";
    });

    elBtnBillingRefresh.addEventListener("click", refreshMeAndUi);

    (async () => {
      try {
        await refreshMeAndUi();
      } catch (e) {
        showBanner({
          kind: "error",
          title: "Dashboard nelze inicializovat",
          text: "Nelze načíst data ze serveru. Zkus obnovit stránku nebo se znovu přihlásit.",
          showGoBilling: false,
        });
        elMetaLine.textContent = "Chyba inicializace – nelze načíst data.";
      }
    })();
  </script>
</body>
</html>
