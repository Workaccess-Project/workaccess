<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Workaccess – Zaměstnanci</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div id="wa-nav"></div>

      <div class="section">
        <h1 style="font-size:18px; margin:0;">Zaměstnanci</h1>
        <div class="small" style="opacity:.9;">Přehled zaměstnanců ve firmě</div>
      </div>

      <div class="section">
        <div id="stateLine" class="small" style="opacity:.95;">—</div>
      </div>

      <div class="section" style="display:flex; gap:10px; flex-wrap:wrap; align-items:center; justify-content:space-between;">
        <input
          id="q"
          type="text"
          placeholder="Hledat (jméno, email, oddělení)…"
          style="flex:1; min-width:260px;"
          autocomplete="off"
        />
        <div style="display:flex; gap:10px; flex-wrap:wrap; align-items:center;">
          <button class="waBtn--primary" id="btnAdd">Přidat zaměstnance</button>
          <button id="btnLoad">Obnovit</button>
        </div>
      </div>

      <!-- Add form -->
      <div class="section" id="addBox" style="display:none; border:1px solid var(--border); border-radius:12px; padding:12px;">
        <div style="display:flex; gap:10px; flex-wrap:wrap; align-items:center; justify-content:space-between;">
          <strong>Přidat zaměstnance</strong>
          <button id="btnAddClose">Zavřít</button>
        </div>

        <div class="small" style="opacity:.85; margin-top:8px;">
          Vyplň minimum: jméno a e-mail. Ostatní můžeš doplnit později.
        </div>

        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:12px;">
          <div>
            <label class="small" for="addName">Jméno</label>
            <input id="addName" type="text" placeholder="Jan Novák" />
          </div>
          <div>
            <label class="small" for="addEmail">Email</label>
            <input id="addEmail" type="email" placeholder="jan@firma.cz" />
          </div>
          <div>
            <label class="small" for="addDept">Oddělení</label>
            <input id="addDept" type="text" placeholder="např. Výroba / Obchod" />
          </div>
          <div>
            <label class="small" for="addPos">Pozice</label>
            <input id="addPos" type="text" placeholder="např. Technik" />
          </div>
          <div>
            <label class="small" for="addRole">Role</label>
            <select id="addRole">
              <option value="hr">HR</option>
              <option value="manager" selected>Manager</option>
              <option value="security">Security</option>
              <option value="external">External</option>
            </select>
          </div>
          <div style="display:flex; align-items:flex-end; gap:10px;">
            <button class="waBtn--primary" id="btnAddSubmit" style="flex:1;">Vytvořit</button>
          </div>
        </div>

        <div id="addMsg" class="small" style="margin-top:10px;"></div>
      </div>

      <div class="section small" id="meta"></div>

      <div class="section">
        <table class="waTable" style="width:100%;">
          <thead>
            <tr>
              <th style="width:25%;">Jméno</th>
              <th style="width:25%;">Email</th>
              <th style="width:20%;">Oddělení</th>
              <th style="width:20%;">Pozice</th>
              <th style="width:10%;">Stav</th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>

        <div id="emptyBox" class="small" style="margin-top:10px;"></div>
      </div>
    </div>
  </div>

  <!-- DŮLEŽITÉ pořadí: config -> nav -> ui_state -> api -->
  <script src="./js/wa_config.js"></script>
  <script src="./js/wa_nav.js"></script>
  <script src="./js/wa_ui_state.js"></script>

  <!-- cache-bust: vynutí načtení nové verze api.js -->
  <script src="./api.js?v=99.0"></script>

  <script>
    WA_NAV.renderNav("employees");

    const elState = document.getElementById("stateLine");
    const elQ = document.getElementById("q");
    const elBtnLoad = document.getElementById("btnLoad");
    const elMeta = document.getElementById("meta");
    const elBody = document.getElementById("tbody");
    const elEmptyBox = document.getElementById("emptyBox");

    // add UI
    const elAddBox = document.getElementById("addBox");
    const elBtnAdd = document.getElementById("btnAdd");
    const elBtnAddClose = document.getElementById("btnAddClose");
    const elBtnAddSubmit = document.getElementById("btnAddSubmit");
    const elAddMsg = document.getElementById("addMsg");

    const elAddName = document.getElementById("addName");
    const elAddEmail = document.getElementById("addEmail");
    const elAddDept = document.getElementById("addDept");
    const elAddPos = document.getElementById("addPos");
    const elAddRole = document.getElementById("addRole");

    function roleLabel(roleKey) {
      const map = {
        hr: "HR",
        manager: "Manažer",
        security: "Bezpečnost",
        external: "Externista"
      };
      return map[roleKey] || roleKey;
    }

    function normalize(s) {
      return String(s ?? "").toLowerCase().trim();
    }

    function matchEmployee(emp, q) {
      if (!q) return true;
      const hay = [
        emp?.name,
        emp?.email,
        emp?.department,
        emp?.team,
        emp?.position,
        emp?.role,
      ].map(normalize).join(" | ");
      return hay.includes(q);
    }

    function clearEmpty() {
      elEmptyBox.innerHTML = "";
    }

    function formatPlanLabel(plan) {
      const p = String(plan || "").trim().toLowerCase();
      if (p === "trial") return "Trial";
      if (p === "basic") return "Basic";
      if (p === "pro") return "Pro";
      if (p === "enterprise") return "Enterprise";
      return plan || "—";
    }

    function buildLimitsMeta(role, filteredCount, limits, fallbackUsed) {
      const used = Number(limits?.employees?.used ?? fallbackUsed ?? 0);
      const limitRaw = limits?.employees?.limit;
      const remainingRaw = limits?.employees?.remaining;
      const remaining = Number(remainingRaw ?? 0);
      const plan = formatPlanLabel(limits?.plan || "");

      const unlimited =
        limitRaw === null ||
        limitRaw === undefined ||
        String(limitRaw).trim() === "" ||
        Number(limitRaw) <= 0;

      const limitLabel = unlimited ? "∞" : String(Number(limitRaw));

      const parts = [
        `Role: ${roleLabel(role)}`,
        `Záznamů: ${filteredCount}`,
        `Zaměstnanci: ${used} / ${limitLabel}`,
        `Tarif: ${plan}`
      ];

      if (!unlimited && remaining <= 0) {
        parts.push("Limit dosažen");
      }

      return parts.join(" • ");
    }

    function openEmployeeDetail(emp) {
      const id = String(emp?.id ?? "").trim();
      if (!id) return;
      location.href = `./employee.html?id=${encodeURIComponent(id)}`;
    }

    function renderRows(list) {
      elBody.innerHTML = "";
      clearEmpty();

      if (!list.length) {
        WA_UI_STATE.renderEmpty(
          elEmptyBox,
          "Nic nenalezeno",
          "Zkus upravit vyhledávání nebo načti data znovu."
        );
        return;
      }

      for (const e of list) {
        const tr = document.createElement("tr");
        tr.style.cursor = "pointer";
        tr.title = "Otevřít detail zaměstnance";
        tr.addEventListener("click", () => openEmployeeDetail(e));

        const tdName = document.createElement("td");
        tdName.textContent = e?.name ?? "—";

        const tdEmail = document.createElement("td");
        tdEmail.textContent = e?.email ?? "—";

        const tdDept = document.createElement("td");
        tdDept.textContent = e?.department ?? e?.team ?? "—";

        const tdPos = document.createElement("td");
        tdPos.textContent = e?.position ?? "—";

        const tdState = document.createElement("td");
        tdState.textContent = e?.status ?? "—";

        tr.appendChild(tdName);
        tr.appendChild(tdEmail);
        tr.appendChild(tdDept);
        tr.appendChild(tdPos);
        tr.appendChild(tdState);

        elBody.appendChild(tr);
      }
    }

    function setControlsEnabled(enabled) {
      elBtnLoad.disabled = !enabled;
      elQ.disabled = !enabled;

      elBtnAdd.disabled = !enabled;
      elBtnAddClose.disabled = !enabled;
      elBtnAddSubmit.disabled = !enabled;
    }

    function showAddBox(show) {
      elAddBox.style.display = show ? "" : "none";
      elAddMsg.textContent = "";
      elAddMsg.style.color = "";

      if (show) {
        setTimeout(() => elAddName.focus(), 50);
      }
    }

    function validateAddForm() {
      const name = normalize(elAddName.value);
      const email = normalize(elAddEmail.value);

      if (!name) return { ok: false, message: "Vyplň jméno." };
      if (!email) return { ok: false, message: "Vyplň e-mail." };
      if (!email.includes("@")) return { ok: false, message: "E-mail nevypadá správně." };

      return { ok: true };
    }

    async function load() {
      const guard = WA_UI_STATE.requireCompanyId();
      if (!guard.ok) {
        WA_UI_STATE.setState(elState, "error", guard.message);
        elMeta.textContent = "";
        elBody.innerHTML = "";
        WA_UI_STATE.renderEmpty(elEmptyBox, "Nelze načíst zaměstnance", guard.message);
        setControlsEnabled(true);
        return;
      }

      setControlsEnabled(false);
      WA_UI_STATE.setState(elState, "loading", "Načítám…");
      clearEmpty();

      try {
        const me = await WA_API.getMe();
        const role = me?.role || WA_NAV.getRole();

        const all = await WA_API.getEmployees();
        const arr = Array.isArray(all) ? all : [];

        let limits = null;
        try {
          limits = await WA_API.getBillingLimits();
        } catch {
          limits = null;
        }

        const q = normalize(elQ.value);
        const filtered = arr.filter((x) => matchEmployee(x, q));

        elMeta.textContent = buildLimitsMeta(role, filtered.length, limits, arr.length);
        renderRows(filtered);

        WA_UI_STATE.setState(elState, "ok", "OK");
      } catch (e) {
        const msg = WA_UI_STATE.friendlyError(e);
        WA_UI_STATE.setState(elState, "error", msg);
        elMeta.textContent = "";
        elBody.innerHTML = "";
        WA_UI_STATE.renderEmpty(elEmptyBox, "Chyba načtení", msg);
      } finally {
        setControlsEnabled(true);
      }
    }

    async function submitAdd() {
      const v = validateAddForm();
      if (!v.ok) {
        elAddMsg.textContent = v.message;
        elAddMsg.style.color = "#fb7185";
        return;
      }

      elAddMsg.textContent = "Vytvářím…";
      elAddMsg.style.color = "";

      setControlsEnabled(false);

      try {
        const payload = {
          name: String(elAddName.value || "").trim(),
          email: String(elAddEmail.value || "").trim(),
          role: String(elAddRole.value || "manager").trim(),
          department: String(elAddDept.value || "").trim(),
          position: String(elAddPos.value || "").trim(),
        };

        await WA_API.createEmployee(payload);

        elAddMsg.textContent = "Hotovo. Obnovuji seznam…";
        elAddMsg.style.color = "#2dd4bf";

        // reset
        elAddName.value = "";
        elAddEmail.value = "";
        elAddDept.value = "";
        elAddPos.value = "";
        elAddRole.value = "manager";

        showAddBox(false);
        await load();
      } catch (e) {
        const msg = WA_UI_STATE.friendlyError(e);
        elAddMsg.textContent = msg;
        elAddMsg.style.color = "#fb7185";
      } finally {
        setControlsEnabled(true);
      }
    }

    elBtnLoad.addEventListener("click", load);
    elQ.addEventListener("keydown", (e) => {
      if (e.key === "Enter") load();
    });

    elBtnAdd.addEventListener("click", () => showAddBox(true));
    elBtnAddClose.addEventListener("click", () => showAddBox(false));
    elBtnAddSubmit.addEventListener("click", submitAdd);

    // init
    load();
  </script>
</body>
</html>
