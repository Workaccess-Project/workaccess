<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Workaccess – Registrace firmy</title>
  <script src="api.js"></script>
  <style>
    body {
      font-family: system-ui, sans-serif;
      background: #0b1220;
      color: #e8eefc;
      margin: 0;
      padding: 40px;
    }
    .card {
      max-width: 560px;
      margin: auto;
      background: #111a2e;
      padding: 24px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.1);
    }
    h2 { margin-top: 0; }
    input, button {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      margin-bottom: 12px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.1);
      background: #0f172a;
      color: #fff;
      box-sizing: border-box;
    }
    button {
      cursor: pointer;
      background: #233255;
    }
    button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }
    .msg {
      margin-top: 10px;
      font-size: 14px;
    }
    .error { color: #fb7185; }
    .ok { color: #2dd4bf; }
    .small {
      font-size: 12px;
      opacity: 0.85;
      line-height: 1.35;
    }
  </style>
</head>
<body>

<div class="card">
  <h2>Registrace firmy</h2>

  <label>Název firmy</label>
  <input id="name" autocomplete="organization" />

  <label>Company ID</label>
  <input id="companyId" autocomplete="off" />

  <label>Jméno administrátora</label>
  <input id="adminName" autocomplete="name" />

  <label>Email administrátora</label>
  <input id="adminEmail" type="email" autocomplete="email" />

  <label>Heslo</label>
  <input id="adminPassword" type="password" autocomplete="new-password" />

  <button id="btnRegister">Vytvořit firmu</button>

  <div class="small">
    Po registraci se automaticky vytvoří firma, první manager účet a spustí se trial tarif.
  </div>

  <div id="registerMsg" class="msg"></div>
</div>

<script>
  const el = {
    name: document.getElementById("name"),
    companyId: document.getElementById("companyId"),
    adminName: document.getElementById("adminName"),
    adminEmail: document.getElementById("adminEmail"),
    adminPassword: document.getElementById("adminPassword"),
    btnRegister: document.getElementById("btnRegister"),
    registerMsg: document.getElementById("registerMsg"),
  };

  function goDashboard() {
    window.location.href = "dashboard.html";
  }

  function setBusy(busy) {
    el.btnRegister.disabled = busy;
  }

  function validateForm() {
    const payload = {
      name: el.name.value.trim(),
      companyId: el.companyId.value.trim(),
      adminName: el.adminName.value.trim(),
      adminEmail: el.adminEmail.value.trim(),
      adminPassword: el.adminPassword.value.trim(),
    };

    if (!payload.name) {
      return { ok: false, message: "Zadej název firmy." };
    }

    if (!payload.companyId) {
      return { ok: false, message: "Zadej companyId." };
    }

    if (!payload.adminName) {
      return { ok: false, message: "Zadej jméno administrátora." };
    }

    if (!payload.adminEmail) {
      return { ok: false, message: "Zadej email administrátora." };
    }

    if (!payload.adminPassword) {
      return { ok: false, message: "Zadej heslo administrátora." };
    }

    return { ok: true, payload };
  }

  el.btnRegister.addEventListener("click", async () => {
    const v = validateForm();

    if (!v.ok) {
      el.registerMsg.textContent = v.message;
      el.registerMsg.className = "msg error";
      return;
    }

    setBusy(true);
    el.registerMsg.textContent = "Zakládám firmu…";
    el.registerMsg.className = "msg";

    try {
      await WA_API.registerCompany(v.payload);

      el.registerMsg.textContent = "Registrace úspěšná → přechod na dashboard";
      el.registerMsg.className = "msg ok";

      setTimeout(goDashboard, 600);
    } catch (err) {
      el.registerMsg.textContent = err.message || "Registrace se nezdařila.";
      el.registerMsg.className = "msg error";
    } finally {
      setBusy(false);
    }
  });
</script>

</body>
</html>
