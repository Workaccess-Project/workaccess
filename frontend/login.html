<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Workaccess – Přihlášení</title>
  <script src="api.js"></script>
  <style>
    body {
      font-family: system-ui, sans-serif;
      background:#0b1220;
      color:#e8eefc;
      margin:0;
      padding:40px;
    }
    .card{
      max-width:520px;
      margin:auto;
      background:#111a2e;
      padding:24px;
      border-radius:16px;
      border:1px solid rgba(255,255,255,0.1);
    }
    h2{margin-top:0}
    input,button{
      width:100%;
      padding:10px;
      margin-top:8px;
      margin-bottom:12px;
      border-radius:8px;
      border:1px solid rgba(255,255,255,0.1);
      background:#0f172a;
      color:#fff;
    }
    button{
      cursor:pointer;
      background:#233255;
    }
    .msg{
      margin-top:10px;
      font-size:14px;
    }
    .error{ color:#fb7185; }
    .ok{ color:#2dd4bf; }
    .small { font-size: 12px; opacity: .85; line-height: 1.35; }
  </style>
</head>
<body>

<div class="card">
  <h2>Přihlášení</h2>

  <label>Email</label>
  <input id="email" autocomplete="email" />

  <label>Heslo</label>
  <input id="password" type="password" autocomplete="current-password" />

  <button id="btnAuthLogin">Přihlásit</button>

  <div class="small">
    Přihlášení v produkci je zabezpečené přes JWT. Pokud nemáš přístupové údaje, kontaktuj administrátora.
  </div>

  <div id="authMsg" class="msg"></div>
</div>

<script>
  const LS = {
    token: "wa_auth_token",
  };

  const el = {
    email: document.getElementById("email"),
    password: document.getElementById("password"),
    btnAuthLogin: document.getElementById("btnAuthLogin"),
    authMsg: document.getElementById("authMsg"),
  };

  function goDashboard(){
    window.location.href = "dashboard.html";
  }

  el.btnAuthLogin.addEventListener("click", async () => {
    el.authMsg.textContent = "Přihlašuji…";
    el.authMsg.className = "msg";

    try {
      const res = await WA_API.login(
        el.email.value.trim(),
        el.password.value.trim()
      );

      localStorage.setItem(LS.token, res.token);

      el.authMsg.textContent = "Přihlášení úspěšné → přechod na dashboard";
      el.authMsg.className = "msg ok";

      setTimeout(goDashboard, 600);
    } catch (err) {
      el.authMsg.textContent = err.message || "Přihlášení se nezdařilo.";
      el.authMsg.className = "msg error";
    }
  });
</script>

</body>
</html>
