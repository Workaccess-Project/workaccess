<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Workaccess – Systémové informace</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div id="wa-nav"></div>

      <div class="section">
        <h1 style="font-size:18px; margin:0;">Systémové informace</h1>
        <div class="small" style="opacity:.85; margin-top:6px;">
          Diagnostický přehled runtime stavu aplikace pro interní ověření a beta support.
        </div>
      </div>

      <div class="section" style="border-top:1px solid var(--border); padding-top:12px;">
        <div style="display:grid; gap:12px; grid-template-columns:repeat(auto-fit, minmax(260px, 1fr));">

          <div>
            <div class="small" style="opacity:.75; margin-bottom:4px;">Verze</div>
            <div id="infoVersion">—</div>
          </div>

          <div>
            <div class="small" style="opacity:.75; margin-bottom:4px;">Prostředí</div>
            <div id="infoEnv">—</div>
          </div>

          <div>
            <div class="small" style="opacity:.75; margin-bottom:4px;">Node.js</div>
            <div id="infoNode">—</div>
          </div>

          <div>
            <div class="small" style="opacity:.75; margin-bottom:4px;">Čas serveru</div>
            <div id="infoTime">—</div>
          </div>

          <div>
            <div class="small" style="opacity:.75; margin-bottom:4px;">Tenant</div>
            <div id="infoTenant">—</div>
          </div>

          <div>
            <div class="small" style="opacity:.75; margin-bottom:4px;">Plan</div>
            <div id="infoPlan">—</div>
          </div>

          <div>
            <div class="small" style="opacity:.75; margin-bottom:4px;">Billing status</div>
            <div id="infoBillingStatus">—</div>
          </div>

          <div>
            <div class="small" style="opacity:.75; margin-bottom:4px;">Stripe</div>
            <div id="infoStripe">—</div>
          </div>

        </div>

        <div style="margin-top:14px; display:flex; gap:10px; flex-wrap:wrap;">
          <button type="button" id="btnReload">Načíst znovu</button>
          <button type="button" id="btnTenantBackup">Stáhnout tenant backup</button>
        </div>
      </div>

      <div class="section" style="border-top:1px solid var(--border); padding-top:12px;">
        <div class="small" style="opacity:.85; margin-bottom:8px;">Raw JSON</div>
        <pre id="rawJson" style="margin:0; white-space:pre-wrap; word-break:break-word; font-size:12px; line-height:1.5;">—</pre>
      </div>

      <div class="section" style="border-top:1px solid var(--border); padding-top:12px;">
        <div class="small" style="opacity:.85; margin-bottom:8px;">Technický stav</div>
        <div id="statusLine" class="small" style="opacity:.8;">Připraveno</div>
      </div>
    </div>
  </div>

  <script src="./js/wa_config.js"></script>
  <script src="./js/wa_nav.js"></script>
  <script src="./api.js?v=111"></script>

  <script>
    WA_NAV.renderNav("system");

    const btnReload = document.getElementById("btnReload");
    const btnTenantBackup = document.getElementById("btnTenantBackup");
    const statusLine = document.getElementById("statusLine");
    const rawJson = document.getElementById("rawJson");

    const infoVersion = document.getElementById("infoVersion");
    const infoEnv = document.getElementById("infoEnv");
    const infoNode = document.getElementById("infoNode");
    const infoTime = document.getElementById("infoTime");
    const infoTenant = document.getElementById("infoTenant");
    const infoPlan = document.getElementById("infoPlan");
    const infoBillingStatus = document.getElementById("infoBillingStatus");
    const infoStripe = document.getElementById("infoStripe");

    function safeString(v) {
      return (v ?? "").toString().trim();
    }

    function currentRole() {
      try {
        return safeString(WA_NAV?.getRole?.()) || "external";
      } catch {
        return "external";
      }
    }

    function isAdminRole() {
      return currentRole() === "admin";
    }

    function setStatus(text, isError = false) {
      statusLine.textContent = text || "";
      statusLine.style.color = isError ? "#b42318" : "";
    }

    function setValue(el, value) {
      el.textContent = safeString(value) || "—";
    }

    function formatJson(data) {
      try {
        return JSON.stringify(data ?? {}, null, 2);
      } catch {
        return "{}";
      }
    }

    function getVersionLabel(system = {}) {
      const buildSha = safeString(system?.version?.buildSha);
      const buildTime = safeString(system?.version?.buildTime);

      if (buildSha && buildTime) return `${buildSha} • ${buildTime}`;
      if (buildSha) return buildSha;
      if (buildTime) return buildTime;
      return "Lokální build / metadata nejsou k dispozici";
    }

    function syncBackupButtonAccess() {
      const allowed = isAdminRole();

      btnTenantBackup.disabled = !allowed;
      btnTenantBackup.title = allowed
        ? "Stáhnout kompletní tenant backup"
        : "Tenant backup je dostupný pouze pro admin roli";
    }

    function fillInfo(data = {}) {
      const system = data?.system && typeof data.system === "object" ? data.system : {};

      setValue(infoVersion, getVersionLabel(system));
      setValue(infoEnv, system.environment || data.environment || data.env);
      setValue(infoNode, system.node || data.node || data.nodeVersion);
      setValue(infoTime, system.serverTime || data.serverTime || data.time || data.timestamp);
      setValue(infoTenant, data.companyId || data.tenant || data.tenantId);
      setValue(infoPlan, data.plan || data.billing?.plan);
      setValue(infoBillingStatus, data.billingStatus || data.billing?.billingStatus);
      setValue(infoStripe, system.stripeMode || data.stripeMode || data.stripe?.mode);

      rawJson.textContent = formatJson(data);
    }

    async function loadSystemInfo() {
      setStatus("Načítám systémové informace...");
      btnReload.disabled = true;
      btnTenantBackup.disabled = true;

      try {
        const data = await WA_API.getSystemInfo();
        fillInfo(data || {});
        syncBackupButtonAccess();

        if (isAdminRole()) {
          setStatus("Systémové informace načteny.");
        } else {
          setStatus("Systémové informace načteny. Tenant backup je dostupný pouze pro admin roli.");
        }
      } catch (e) {
        rawJson.textContent = "—";
        syncBackupButtonAccess();
        setStatus(`Nepodařilo se načíst systémové informace: ${e?.message || e}`, true);
      } finally {
        btnReload.disabled = false;
        if (isAdminRole()) {
          btnTenantBackup.disabled = false;
        }
      }
    }

    async function downloadTenantBackup() {
      if (!isAdminRole()) {
        syncBackupButtonAccess();
        setStatus("Tenant backup je dostupný pouze pro admin roli.", true);
        return;
      }

      btnTenantBackup.disabled = true;
      setStatus("Stahuji tenant backup...");

      try {
        const result = await WA_API.fetchTenantBackupBlob();
        const blob = result?.blob;
        const fileName = safeString(result?.fileName) || "tenant-backup.json";

        const blobUrl = window.URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = blobUrl;
        a.download = fileName;
        document.body.appendChild(a);
        a.click();
        a.remove();
        window.URL.revokeObjectURL(blobUrl);

        setStatus("Tenant backup byl úspěšně stažen.");
      } catch (e) {
        setStatus(`Nepodařilo se stáhnout tenant backup: ${e?.message || e}`, true);
      } finally {
        if (isAdminRole()) {
          btnTenantBackup.disabled = false;
        }
      }
    }

    btnReload.addEventListener("click", loadSystemInfo);
    btnTenantBackup.addEventListener("click", downloadTenantBackup);

    syncBackupButtonAccess();
    loadSystemInfo();
  </script>
</body>
</html>
